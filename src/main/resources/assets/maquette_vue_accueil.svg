<svg xmlns="http://www.w3.org/2000/svg" width="660" height="430" viewBox="0 0 660 430">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .h1 { font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .sub { font-size: 12px; fill: #7f8c8d; }
      .carre { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .nom { font-size: 11px; fill: #555; }
      .stat { font-size: 11px; fill: #2980b9; font-weight: bold; }
      .badge { font-size: 10px; font-weight: bold; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond fenetre -->
  <rect width="660" height="430" rx="6" ry="6" fill="#fdfdfd" stroke="#888" stroke-width="1.5"/>

  <!-- En-tete (fx:include enTete) -->
  <rect x="1.5" y="1.5" width="657" height="72" fill="white" stroke="#e1e4e8" stroke-width="1"/>
  <text x="22" y="34" class="h1">Mes sites de suivi</text>
  <text x="22" y="56" class="sub">2 sites déclarés</text>
  <rect x="510" y="22" width="128" height="32" rx="6" fill="#4a90d9" stroke="#3a7bc8" stroke-width="1"/>
  <text x="574" y="43" text-anchor="middle" font-size="13" font-weight="bold" fill="white">+ Nouveau site</text>
  <text x="300" y="20" class="id-tag">en-tête : EnTeteView.fxml (fx:include "enTete")</text>

  <!-- Liste (fx:include listeSites) : VBox de SiteCarte -->
  <rect x="1.5" y="74" width="657" height="354" fill="#f5f6f7" stroke="#e1e4e8" stroke-width="1"/>
  <text x="22" y="94" class="id-tag">liste : ListeSitesView.fxml (fx:include "listeSites") — VBox de SiteCarte</text>

  <!-- Tuile SiteCarte 1 -->
  <rect x="22" y="104" width="616" height="68" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="40" y="130" class="carre">Carré 640380</text>
  <text x="42" y="148" class="nom">📍 Étang de la Tuilière (Aix-en-Provence)</text>
  <rect x="40" y="154" width="56" height="18" rx="9" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="68" y="167" text-anchor="middle" class="badge" fill="#1e8449">Il y a 2j</text>
  <text x="560" y="135" text-anchor="end" class="stat">3 points · 7 passages</text>

  <!-- Tuile SiteCarte 2 -->
  <rect x="22" y="184" width="616" height="68" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="40" y="210" class="carre">Carré 752204</text>
  <text x="42" y="228" class="nom">📍 ZAC Nord (Marseille)</text>
  <rect x="40" y="234" width="56" height="18" rx="9" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="68" y="247" text-anchor="middle" class="badge" fill="#b9770e">Il y a 8j</text>
  <text x="560" y="215" text-anchor="end" class="stat">2 points · 3 passages</text>

  <!-- Annotation globale -->
  <text x="330" y="290" text-anchor="middle" class="id-tag">VueAccueilController relie les deux sous-contrôleurs (clic « + Nouveau site » → ajoute une tuile)</text>
</svg>
