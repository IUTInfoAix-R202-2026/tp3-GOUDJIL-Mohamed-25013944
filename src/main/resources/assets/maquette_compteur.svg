<svg xmlns="http://www.w3.org/2000/svg" width="380" height="250" viewBox="0 0 380 250">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .val { font-size: 34px; font-weight: bold; fill: #2c3e50; }
      .btn { font-size: 14px; fill: #2c3e50; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="380" height="250" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Fenetre (VBox racine) -->
  <rect x="20" y="20" width="340" height="210" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="32" y="40" class="id-tag">VBox (fx:controller = CompteurController)</text>

  <!-- Valeur du compteur -->
  <text x="190" y="92" text-anchor="middle" class="val">0</text>
  <text x="248" y="78" class="id-tag">#valeur (Label, mis à jour par le contrôleur)</text>

  <!-- Boutons - et + (HBox) -->
  <rect x="120" y="115" width="55" height="36" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="147" y="139" text-anchor="middle" class="btn">−</text>
  <rect x="185" y="115" width="55" height="36" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="212" y="139" text-anchor="middle" class="btn">+</text>

  <!-- Bouton Réinitialiser -->
  <rect x="130" y="168" width="120" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="190" y="188" text-anchor="middle" class="btn" font-size="12">Réinitialiser</text>

  <!-- Annotation -->
  <text x="190" y="218" text-anchor="middle" class="id-tag">boutons : onAction="#incrementer" / "#decrementer" / "#reinitialiser"</text>
</svg>
