<svg xmlns="http://www.w3.org/2000/svg" width="420" height="240" viewBox="0 0 420 240">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .label { font-size: 12px; fill: #34495e; }
      .ph { font-size: 11px; fill: #b2bec3; }
      .btn { font-size: 12px; fill: #95a5a6; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="420" height="240" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Fenetre (GridPane stylé en CSS) -->
  <rect x="20" y="20" width="380" height="200" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="32" y="40" class="id-tag">GridPane + feuille CSS (.fxml + .css)</text>

  <!-- Identifiant -->
  <text x="150" y="74" text-anchor="end" class="label">Identifiant :</text>
  <rect x="160" y="60" width="210" height="26" rx="3" fill="white" stroke="#3498db" stroke-width="1.5"/>
  <text x="380" y="74" class="id-tag">#user-id</text>

  <!-- Mot de passe -->
  <text x="150" y="116" text-anchor="end" class="label">Mot de passe :</text>
  <rect x="160" y="102" width="210" height="26" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="170" y="119" class="ph">8 car. mini, 1 majuscule, 1 chiffre</text>
  <text x="380" y="116" class="id-tag">#pwd</text>

  <!-- Boutons Annuler / OK (désactivés au départ) -->
  <rect x="215" y="150" width="70" height="28" rx="4" fill="#ecf0f1" stroke="#d0d7de" stroke-width="1"/>
  <text x="250" y="169" text-anchor="middle" class="btn">Annuler</text>
  <rect x="300" y="150" width="70" height="28" rx="4" fill="#ecf0f1" stroke="#d0d7de" stroke-width="1"/>
  <text x="335" y="169" text-anchor="middle" class="btn">OK</text>

  <!-- Annotation -->
  <text x="210" y="202" text-anchor="middle" class="id-tag">OK / Annuler désactivés tant que la saisie n'est pas valide (bindings)</text>
</svg>
