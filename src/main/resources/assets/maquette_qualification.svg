<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .th { font-size: 12px; font-weight: bold; fill: #2c3e50; }
      .td { font-size: 11px; fill: #2c3e50; }
      .h2 { font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .lab { font-size: 12px; font-weight: bold; fill: #2c3e50; }
      .muted { font-size: 11px; fill: #95a5a6; }
      .btn { font-size: 12px; fill: #7f8c8d; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="880" height="500" rx="6" ry="6" fill="#fdfdfd" stroke="#888" stroke-width="1.5"/>

  <!-- ===== Gauche : TableView<Sequence> ===== -->
  <rect x="10" y="10" width="500" height="470" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <!-- En-tete de colonnes -->
  <rect x="10" y="10" width="500" height="28" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="22" y="29" class="th">Horodatage</text>
  <text x="125" y="29" class="th">Fréquence (kHz)</text>
  <text x="265" y="29" class="th">Durée (s)</text>
  <text x="360" y="29" class="th">Statut</text>
  <line x1="115" y1="10" x2="115" y2="480" stroke="#e6e6e6"/>
  <line x1="255" y1="10" x2="255" y2="480" stroke="#e6e6e6"/>
  <line x1="345" y1="10" x2="345" y2="480" stroke="#e6e6e6"/>
  <!-- Lignes -->
  <rect x="11" y="38" width="498" height="24" fill="#eaf3fb" stroke="#3498db" stroke-width="1"/>
  <text x="22" y="55" class="td">20:00</text><text x="125" y="55" class="td">92.76</text><text x="270" y="55" class="td">5</text><text x="360" y="55" class="td">À écouter</text>
  <text x="22" y="79" class="td">21:06</text><text x="125" y="79" class="td">88.32</text><text x="270" y="79" class="td">5</text><text x="360" y="79" class="td">À écouter</text>
  <text x="22" y="103" class="td">22:12</text><text x="125" y="103" class="td">50.87</text><text x="270" y="103" class="td">5</text><text x="360" y="103" class="td">À écouter</text>
  <text x="22" y="127" class="td">23:18</text><text x="125" y="127" class="td">47.71</text><text x="270" y="127" class="td">5</text><text x="360" y="127" class="td">À écouter</text>
  <line x1="11" y1="62" x2="509" y2="62" stroke="#eee"/>
  <line x1="11" y1="86" x2="509" y2="86" stroke="#eee"/>
  <line x1="11" y1="110" x2="509" y2="110" stroke="#eee"/>
  <text x="22" y="470" class="id-tag">#tableSequences — TableView&lt;Sequence&gt; (modèle : NuitVerification + ObservableList)</text>

  <!-- ===== Droite : panneau de qualification ===== -->
  <text x="540" y="35" class="h2">Détail de la séquence</text>
  <text x="540" y="56" class="muted">(sélectionnez une séquence dans le tableau)</text>

  <rect x="540" y="72" width="150" height="30" rx="4" fill="#ecf0f1" stroke="#d0d7de" stroke-width="1"/>
  <text x="615" y="92" text-anchor="middle" class="btn">▶ Écouter (simulé)</text>

  <text x="540" y="140" class="lab">Verdict global de la nuit :</text>
  <rect x="540" y="150" width="210" height="28" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <path d="M732,160 l8,0 l-4,7 z" fill="#7f8c8d"/>

  <text x="540" y="208" class="lab">Commentaire libre :</text>
  <rect x="540" y="218" width="300" height="74" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="552" y="238" class="muted">vent fort vers 02:00, sons à vérifier…</text>

  <rect x="540" y="306" width="170" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="625" y="326" text-anchor="middle" class="td">Enregistrer le verdict</text>
  <text x="722" y="326" class="muted">Verdict global : (à saisir)</text>

  <text x="540" y="470" class="id-tag">panneau de détail — QualificationController (sélection → mise à jour de la vue)</text>
</svg>
