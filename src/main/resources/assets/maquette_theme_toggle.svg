<svg xmlns="http://www.w3.org/2000/svg" width="620" height="320" viewBox="0 0 620 320">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 13px; font-weight: bold; fill: #2c3e50; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="620" height="320" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="310" y="28" text-anchor="middle" class="title">Bonus 8 - Bascule de thème (CSS dynamique) — même Scene, deux feuilles CSS</text>

  <!-- ===== Theme clair ===== -->
  <rect x="22" y="46" width="282" height="214" rx="4" fill="#f5f6f7" stroke="#bdc3c7" stroke-width="1.5"/>
  <rect x="196" y="58" width="96" height="26" rx="4" fill="#e8eaed" stroke="#bdc3c7" stroke-width="1"/>
  <text x="244" y="75" text-anchor="middle" font-size="11" fill="#2c3e50">Mode sombre</text>
  <text x="40" y="110" font-size="16" font-weight="bold" fill="#2c3e50">Bascule du thème</text>
  <rect x="40" y="130" width="246" height="64" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <text x="54" y="154" font-size="12" font-weight="bold" fill="#2c3e50">Carte d'exemple</text>
  <text x="54" y="174" font-size="11" fill="#7f8c8d">rendu selon theme-clair.css</text>
  <text x="40" y="232" font-size="11" font-style="italic" fill="#95a5a6">thème clair</text>

  <!-- ===== Theme sombre ===== -->
  <rect x="316" y="46" width="282" height="214" rx="4" fill="#1a1a2e" stroke="#3b3b55" stroke-width="1.5"/>
  <rect x="490" y="58" width="92" height="26" rx="4" fill="#2c2c44" stroke="#4a4a6a" stroke-width="1"/>
  <text x="536" y="75" text-anchor="middle" font-size="11" fill="#ecf0f1">Mode clair</text>
  <text x="334" y="110" font-size="16" font-weight="bold" fill="#ecf0f1">Bascule du thème</text>
  <rect x="334" y="130" width="246" height="64" rx="6" fill="#26263f" stroke="#4a4a6a" stroke-width="1"/>
  <text x="348" y="154" font-size="12" font-weight="bold" fill="#ecf0f1">Carte d'exemple</text>
  <text x="348" y="174" font-size="11" fill="#aab0c0">rendu selon theme-sombre.css</text>
  <text x="334" y="232" font-size="11" font-style="italic" fill="#95a5a6">thème sombre</text>

  <!-- Annotation -->
  <text x="310" y="294" text-anchor="middle" class="id-tag">le ToggleButton fait scene.getStylesheets().setAll(theme-clair.css ↔ theme-sombre.css) — aucune reconstruction de la scène</text>
</svg>
