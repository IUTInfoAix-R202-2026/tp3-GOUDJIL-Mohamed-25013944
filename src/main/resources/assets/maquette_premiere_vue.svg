<svg xmlns="http://www.w3.org/2000/svg" width="460" height="280" viewBox="0 0 460 280">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .h1 { font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .desc { font-size: 12px; fill: #7f8c8d; }
      .btn { font-size: 12px; fill: #2c3e50; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="460" height="280" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Fenetre (VBox racine FXML) -->
  <rect x="20" y="20" width="420" height="240" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="32" y="40" class="id-tag">VBox (racine FXML, centré)</text>

  <!-- Contenu décrit dans le .fxml -->
  <text x="230" y="92" text-anchor="middle" class="h1">Bienvenue dans le monde FXML !</text>
  <text x="230" y="135" text-anchor="middle" class="desc">Cette interface est décrite dans un fichier XML.</text>
  <text x="230" y="153" text-anchor="middle" class="desc">Aucun code Java ne l'a construite.</text>

  <!-- Bouton -->
  <rect x="145" y="190" width="170" height="30" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="230" y="210" text-anchor="middle" class="btn">D'accord, c'est magique</text>

  <!-- Annotation -->
  <text x="230" y="248" text-anchor="middle" class="id-tag">chargé par FXMLLoader.load(...) — aucun fx:controller</text>
</svg>
