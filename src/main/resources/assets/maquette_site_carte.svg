<svg xmlns="http://www.w3.org/2000/svg" width="580" height="320" viewBox="0 0 580 320">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 13px; font-weight: bold; fill: #2c3e50; }
      .carre { font-size: 16px; font-weight: bold; fill: #2c3e50; }
      .nom { font-size: 12px; fill: #555; }
      .stat { font-size: 12px; fill: #2980b9; font-weight: bold; }
      .badge { font-size: 11px; font-weight: bold; }
      .id-tag { font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
  </defs>

  <!-- Fond -->
  <rect width="580" height="320" rx="8" ry="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="290" y="28" text-anchor="middle" class="title">Composant SiteCarte — racine fx:root = HBox réutilisable</text>

  <!-- Tuile SiteCarte -->
  <rect x="30" y="50" width="520" height="92" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <!-- Bloc identité (gauche) -->
  <text x="48" y="80" class="carre">Carré 640380</text>
  <text x="50" y="100" class="nom">📍 Étang de la Tuilière (Aix-en-Provence)</text>
  <rect x="48" y="110" width="62" height="20" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="79" y="124" text-anchor="middle" class="badge" fill="#1e8449">Il y a 2j</text>
  <!-- Stats (droite) -->
  <text x="470" y="96" text-anchor="end" class="stat">3 points d'écoute</text>
  <text x="535" y="96" text-anchor="end" class="stat">7 passages</text>

  <!-- Annotations -->
  <text x="180" y="74" class="id-tag">#numeroCarre (StringProperty)</text>
  <text x="270" y="100" class="id-tag">#nomConvivial</text>
  <text x="120" y="124" class="id-tag">#badge — styleClass : badge-fresh / badge-stale / badge-cold</text>
  <text x="350" y="116" class="id-tag">#nbPoints / #nbPassages (IntegerProperty)</text>

  <!-- Legende des badges de fraicheur -->
  <text x="40" y="186" class="title">Badge de fraîcheur (couleur selon joursDepuisDernierPassage) :</text>

  <rect x="48" y="200" width="62" height="20" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="79" y="214" text-anchor="middle" class="badge" fill="#1e8449">Il y a 2j</text>
  <text x="122" y="214" class="nom">&lt; 7 jours — vert (fresh)</text>

  <rect x="48" y="230" width="62" height="20" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="79" y="244" text-anchor="middle" class="badge" fill="#b9770e">Il y a 8j</text>
  <text x="122" y="244" class="nom">7 à 30 jours — orange (stale)</text>

  <rect x="48" y="260" width="92" height="20" rx="10" fill="#eaecee" stroke="#95a5a6" stroke-width="1"/>
  <text x="94" y="274" text-anchor="middle" class="badge" fill="#566573">Jamais utilisé</text>
  <text x="152" y="274" class="nom">&gt; 30 jours ou jamais — gris (cold)</text>
</svg>
